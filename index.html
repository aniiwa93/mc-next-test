<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MC Next Test</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      font-weight: 300;
    }

    /* HERO */
    .hero {
      height: 65vh;
      background-image: url("https://www.neauvia.com/wp-content/uploads/2022/05/05_NEAUVIA_1413@2x-min.jpg");
      background-size: cover;
      background-position: center;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.35);
    }

    .hero-content {
      position: relative;
      z-index: 2;
      color: white;
    }

    h1 {
      font-weight: 200;
      letter-spacing: 4px;
      font-size: 44px;
      margin: 0;
      text-transform: uppercase;
    }

    .subtitle {
      margin-top: 10px;
      font-weight: 300;
      letter-spacing: 2px;
      color: #ff3b3b;
      text-transform: uppercase;
    }

    /* SECTIONS */
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 60px 20px;
      text-align: center;
    }

    p {
      font-weight: 300;
      color: #444;
      line-height: 1.6;
    }

    /* BUTTONS */
    .btn {
      background: #ff3b3b;
      color: white;
      border: none;
      padding: 14px 28px;
      margin: 15px;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      font-weight: 300;
    }

    .btn:hover {
      background: #d92f2f;
    }

    /* LINKS */
    a {
      color: #ff3b3b;
      text-decoration: none;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-size: 13px;
    }

    a:hover {
      text-decoration: underline;
    }

    /* IMAGE SECTION */
    .image-section {
      background: #f7f7f7;
      padding: 50px 20px;
    }

    .image-box {
      max-width: 900px;
      margin: auto;
    }

    .image-box img {
      width: 100%;
      border-radius: 4px;
    }

    /* FORM */
    input {
      padding: 12px;
      width: 60%;
      border: 1px solid #ddd;
      font-weight: 300;
      margin-top: 10px;
    }

    h2 {
      font-weight: 200;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
  </style>
</head>

<body>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-content">
      <h1>Aesthetic Science</h1>
      <div class="subtitle">Innovation in Skin Health</div>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="container">
    <p>
      Premium medical aesthetics experience designed for testing Marketing Cloud Next tracking events.
    </p>

    <!-- BUTTON -->
    <button id="cta" class="btn">Book Consultation</button>

    <!-- LINK CLICK -->
    <div style="margin-top: 20px;">
      <a href="https://www.example.com" id="main-link">
        Discover More
      </a>
    </div>
  </div>

  <!-- IMAGE -->
  <div class="image-section">
    <div class="image-box">
      <img src="https://www.neauvia.com/wp-content/uploads/2022/05/05_NEAUVIA_1179@2x-min.jpg" alt="Skin aesthetic">
    </div>
  </div>

  <!-- FORM -->
  <div class="container">
    <h2>Join the Clinic Experience</h2>

    <form id="test-form">
      <input type="text" name="name" placeholder="Your Name" />
      <br><br>
      <button type="submit" class="btn">Submit</button>
    </form>
  </div>

</body>
</html>
