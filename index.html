<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MC Next Test</title>
<script src="https://cdn.c360a.salesforce.com/beacon/c360a/1e8aaae5-7caa-4911-b951-29ef25698a61/scripts/c360a.min.js?wtcp_id=1NDVe0000000CVpOAM"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #8b0f1a; /* deep medical red */
      color: #1a1a1a;
      font-weight: 300;
    }

    /* HERO */
    .hero {
      height: 65vh;
      background-image: url("https://images.unsplash.com/photo-1581595219315-a187dd40c322?auto=format&fit=crop&w=1600&q=80");
      background-size: cover;
      background-position: center;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.45);
    }

    .hero-content {
      position: relative;
      z-index: 2;
      color: white;
    }

    h1 {
      font-weight: 200;
      letter-spacing: 4px;
      font-size: 44px;
      margin: 0;
      text-transform: uppercase;
    }

    .subtitle {
      margin-top: 10px;
      font-weight: 300;
      letter-spacing: 2px;
      color: #ffdddd;
      text-transform: uppercase;
    }

    /* WHITE CARD SECTIONS */
    .card {
      max-width: 800px;
      margin: 40px auto;
      background: white;
      padding: 50px 25px;
      border-radius: 6px;
      text-align: center;
    }

    p {
      font-weight: 300;
      color: #444;
      line-height: 1.6;
    }

    /* BUTTON */
    .btn {
      background: #8b0f1a;
      color: white;
      border: none;
      padding: 14px 28px;
      margin: 15px;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      font-weight: 300;
    }

    .btn:hover {
      background: #6f0c14;
    }

    /* LINK */
    a {
      color: #8b0f1a;
      text-decoration: none;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-size: 13px;
    }

    a:hover {
      text-decoration: underline;
    }

    /* IMAGE */
    .image-box img {
      width: 100%;
      border-radius: 6px;
      margin-top: 20px;
    }

    /* FORM PLACEHOLDER (Salesforce-ready) */
    .form-placeholder {
      border: 1px dashed #ccc;
      padding: 40px;
      margin-top: 20px;
      color: #777;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-content">
      <h1>Aesthetic Science</h1>
      <div class="subtitle">Clinical Beauty Innovation</div>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="card">
    <p>
      Premium test page for Marketing Cloud Next tracking with medical aesthetics layout.
    </p>

    <button id="cta" class="btn">Book Consultation</button>

    <div style="margin-top: 20px;">
      <a href="https://www.neauvia.com" id="main-link">
        Discover More
      </a>
    </div>

    <div class="image-box">
      <img src="https://images.unsplash.com/photo-1579154204601-01588f351e67?auto=format&fit=crop&w=1600&q=80" alt="Medical aesthetics">
    </div>
  </div>

  <!-- SALESFORCE FORM SECTION -->
  <div class="card">
    <h2 style="font-weight:200; letter-spacing:3px; text-transform:uppercase;">
      Join Experience
    </h2>

    <!-- TU WSTAWISZ SALESFORCE FORM -->
    <div id="salesforce-form-container" class="form-placeholder">
      Salesforce form will be embedded here (MC / Forms / Web Studio / Experience Cloud)
    </div>
  </div>

</body>
</html>
