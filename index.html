<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MC Next Test</title>

<!-- Salesforce Web Tracking -->
<script src="https://cdn.c360a.salesforce.com/beacon/c360a/1e8aaae5-7caa-4911-b951-29ef25698a61/scripts/c360a.min.js?wtcp_id=1NDVe0000000CVpOAM"></script>

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: #8b0f1a;
  color: #1a1a1a;
  font-weight: 300;
}

.hero {
  height: 65vh;
  background-image: url("https://images.unsplash.com/photo-1581595219315-a187dd40c322?auto=format&fit=crop&w=1600&q=80");
  background-size: cover;
  background-position: center;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.45);
}

.hero-content {
  position: relative;
  z-index: 2;
  color: white;
}

h1 {
  font-weight: 200;
  letter-spacing: 4px;
  font-size: 44px;
  margin: 0;
  text-transform: uppercase;
}

.subtitle {
  margin-top: 10px;
  font-weight: 300;
  letter-spacing: 2px;
  color: #ffdddd;
  text-transform: uppercase;
}

.card {
  max-width: 800px;
  margin: 40px auto;
  background: white;
  padding: 50px 25px;
  border-radius: 6px;
  text-align: center;
}

p {
  font-weight: 300;
  color: #444;
  line-height: 1.6;
}

.btn {
  background: #8b0f1a;
  color: white;
  border: none;
  padding: 14px 28px;
  margin: 15px;
  font-size: 13px;
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: pointer;
  font-weight: 300;
}

.btn:hover {
  background: #6f0c14;
}

a {
  color: #8b0f1a;
  text-decoration: none;
  letter-spacing: 2px;
  text-transform: uppercase;
  font-size: 13px;
}

a:hover {
  text-decoration: underline;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h1>Aesthetic Science</h1>
    <div class="subtitle">Clinical Beauty Innovation</div>
  </div>
</div>

<!-- CONTENT -->
<div class="card">
  <p>Premium test page for Marketing Cloud Next tracking with medical aesthetics layout.</p>

  <button id="cta" class="btn">Book Consultation</button>

  <div style="margin-top: 20px;">
    <a href="https://www.neauvia.com" id="main-link">Discover More</a>
  </div>
</div>

<!-- FORM -->
<div class="card">
  <h2 style="font-weight:200; letter-spacing:3px; text-transform:uppercase;">
    Join Experience
  </h2>

  <!-- Salesforce Form Handler requirements added -->
  <form id="MCM5CXRHCJT5FRDGN3ARQP5DDA6M" data-uma-forms="true">

    <input type="text" id="firstName" placeholder="First name"
      style="width:100%; padding:12px; margin:8px 0; border:1px solid #ddd;" />

    <input type="text" id="lastName" placeholder="Last name"
      style="width:100%; padding:12px; margin:8px 0; border:1px solid #ddd;" />

    <input type="text" id="company" placeholder="Company"
      style="width:100%; padding:12px; margin:8px 0; border:1px solid #ddd;" />

    <input type="text" id="city" placeholder="City"
      style="width:100%; padding:12px; margin:8px 0; border:1px solid #ddd;" />

    <input type="email" id="email" placeholder="Email address" required
      style="width:100%; padding:12px; margin:8px 0; border:1px solid #ddd;" />

    <button type="submit" class="btn">Submit</button>
  </form>

  <p id="form-status" style="margin-top:10px; color:green;"></p>
</div>

<!-- Salesforce Form Handler Script (MUST be before </body>) -->
<script async
  src="https://neauviaglobal--mcpoc.sandbox.my.site.com/lp/assets/scripts/external-form-handler-host.min.js"
  onload="SFDCFormHandler.init('https://neauviaglobal--mcpoc.sandbox.my.site.com/lp')">
</script>

<script>
document.getElementById("lead-form")?.addEventListener("submit", function(e) {
  e.preventDefault();
});

// form handler (custom tracking)
document.getElementById("MCM5CXRHCJT5FRDGN3ARQP5DDA6M")
.addEventListener("submit", function(e) {
  e.preventDefault();

  var firstName = document.getElementById("firstName").value;
  var lastName  = document.getElementById("lastName").value;
  var company   = document.getElementById("company").value;
  var city      = document.getElementById("city").value;
  var email     = document.getElementById("email").value;

  document.getElementById("form-status").innerText = "Submitting...";

  // Identity event
  if (window.SalesforceInteractions && SalesforceInteractions.sendEvent) {
    SalesforceInteractions.sendEvent({
      user: {
        attributes: {
          eventType: "identity",
          firstName: firstName,
          lastName: lastName,
          company: company,
          city: city,
          email: email,
          isAnonymous: 0
        }
      }
    });

    // Contact point email
    SalesforceInteractions.sendEvent({
      user: {
        attributes: {
          eventType: "contactPointEmail",
          email: email
        }
      }
    });
  }

  document.getElementById("form-status").innerText =
    "Thank you! We will contact you soon.";
});
</script>

</body>
</html>
