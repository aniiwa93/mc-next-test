<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MC Next Test</title>

  <!-- WEB TRACKING -->
  <script src="https://cdn.c360a.salesforce.com/beacon/c360a/1e8aaae5-7caa-4911-b951-29ef25698a61/scripts/c360a.min.js?wtcp_id=1NDVe0000000CVpOAM"></script>

  <style>
    body { margin:0; font-family:Arial; background:#8b0f1a; }

    .card {
      max-width:800px;
      margin:40px auto;
      background:#fff;
      padding:40px;
      border-radius:8px;
      text-align:center;
    }

    .btn {
      background:#8b0f1a;
      color:#fff;
      border:none;
      padding:12px 24px;
      cursor:pointer;
      text-transform:uppercase;
      letter-spacing:2px;
    }

    input {
      width:100%;
      padding:10px;
      margin:6px 0;
      border:1px solid #ddd;
    }
  </style>
</head>

<body>

<!-- HERO -->
<div class="card">
  <h1>Aesthetic Science</h1>
  <p>Clinical Beauty Innovation</p>
</div>

<!-- FORM -->
<div class="card">
  <h2>Join Experience</h2>

  <form id="lead-form">
    
    <input id="firstName" placeholder="First name" />
    <input id="lastName" placeholder="Last name" />
    <input id="email" type="email" placeholder="Email" required />
    <input id="company" placeholder="Company" />
    <input id="city" placeholder="City" />

    <button type="submit" class="btn">Submit</button>
  </form>

  <p id="form-status"></p>
</div>

<!-- LINK -->
<div class="card">
  <a href="https://www.neauvia.com" id="main-link">
    Discover More
  </a>
</div>

<!-- FORM HANDLER SCRIPT (MUST BE BEFORE </body>) -->
<script async
  src="https://neauviaglobal--mcpoc.sandbox.my.site.com/lp/assets/scripts/external-form-handler-host.min.js"
  onload="SFDCFormHandler.init('https://neauviaglobal--mcpoc.sandbox.my.site.com/lp')">
</script>

<!-- TRACKING -->
<script>
document.addEventListener("DOMContentLoaded", function () {

  document.getElementById("lead-form").addEventListener("submit", function(e) {
    e.preventDefault();

    var firstName = document.getElementById("firstName").value;
    var lastName  = document.getElementById("lastName").value;
    var email     = document.getElementById("email").value;
    var company   = document.getElementById("company").value;
    var city      = document.getElementById("city").value;

    document.getElementById("form-status").innerText = "Submitting...";

    // Identity
    if (window.SalesforceInteractions) {
      SalesforceInteractions.sendEvent({
        user: {
          attributes: {
            eventType: "identity",
            firstName,
            lastName,
            email,
            company,
            city,
            isAnonymous: 0
          }
        }
      });

      // Email binding
      SalesforceInteractions.sendEvent({
        user: {
          attributes: {
            eventType: "contactPointEmail",
            email
          }
        }
      });
    }

    document.getElementById("form-status").innerText =
      "Thank you! We will contact you soon.";
  });

});
</script>

</body>
</html>
