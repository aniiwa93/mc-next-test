<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MC Next Test</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #ffffff;
      color: #2b2b2b;
    }

    .hero {
      height: 60vh;
      background-image: url("https://www.neauvia.com/wp-content/uploads/2022/05/05_NEAUVIA_1413@2x-min.jpg");
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
      position: relative;
    }

    .hero::after {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.35);
    }

    .hero-content {
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: 42px;
      margin: 0;
      letter-spacing: 1px;
    }

    p {
      font-size: 18px;
      opacity: 0.9;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 60px 20px;
      text-align: center;
    }

    .cta-button {
      background-color: #111;
      color: white;
      border: none;
      padding: 14px 26px;
      margin: 15px;
      font-size: 14px;
      letter-spacing: 1px;
      cursor: pointer;
      text-transform: uppercase;
    }

    .cta-button:hover {
      background-color: #333;
    }

    a {
      color: #111;
      text-decoration: none;
      font-weight: bold;
      display: inline-block;
      margin-top: 20px;
    }

    a:hover {
      text-decoration: underline;
    }

    .section {
      padding: 40px 20px;
      background: #f7f7f7;
      text-align: center;
    }

    .image-box {
      max-width: 900px;
      margin: 0 auto;
    }

    .image-box img {
      width: 100%;
      border-radius: 6px;
    }
  </style>
</head>

<body>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-content">
      <h1>Rethinking Medical Aesthetics</h1>
      <p>Science. Innovation. Synergy.</p>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="container">
    <p>Marketing Cloud Next tracking test page with premium aesthetic layout.</p>

    <!-- BUTTON -->
    <button id="cta" class="cta-button">Book a Consultation</button>

    <!-- LINK CLICK TEST -->
    <div>
      <a href="https://www.example.com" id="main-link">
        Explore More
      </a>
    </div>
  </div>

  <!-- IMAGE SECTION -->
  <div class="section">
    <div class="image-box">
      <img src="https://www.neauvia.com/wp-content/uploads/2022/05/05_NEAUVIA_1179@2x-min.jpg" alt="Aesthetic skincare image">
    </div>
  </div>

  <!-- FORM -->
  <div class="container">
    <h2>Join the Experience</h2>
    <form id="test-form">
      <input type="text" name="name" placeholder="Your name"
        style="padding:10px; width:60%; margin-top:10px;">
      <br><br>
      <button type="submit" class="cta-button">Submit</button>
    </form>
  </div>

</body>
</html>
